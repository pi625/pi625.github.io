---
layout: default
---

<header class="page-header">
  <h1 class="post-title">{{ page.heading | default: page.title }}</h1>
</header>

{% include subnav.html %}

{% assign body = content | strip %}
{% if body != "" %}
<div class="page-body glass-card">
  {{ content }}
</div>
{% endif %}

{% if page.list %}
  {% include post_list.html dir=page.list %}
{% endif %}
