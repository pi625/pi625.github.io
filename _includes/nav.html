{% if site.theme_config.show_navbar %}
<nav class="site-nav glass-nav" aria-label="Primary">
  <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
  <div class="nav-links">
    {% for item in site.data.home.navbar_entries %}
      {% assign target = item.url | relative_url %}
      <a href="{{ item.url | relative_url }}"
         {% if page.url == target %}class="active"{% endif %}>{{ item.title }}</a>
    {% endfor %}
  </div>
</nav>
{% endif %}
